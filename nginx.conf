server {
    listen 80;
    server_name _;
    
    # Where the Vite built files are stored
    root /usr/share/nginx/html;
    index index.html;
    
    # Serve static files, or fallback to index.html for React Router
    location / {
        try_files $uri $uri/ /index.html;
    }
    
    # Aggressively cache static assets with cache-busting filenames
    location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff2|woff|ttf|eot)$ {
        expires 1y;
        add_header Cache-Control "public, no-transform";
    }
    
    # Do not cache index.html to ensure clients get the latest React Router maps
    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate, proxy-revalidate, max-age=0";
    }
}
